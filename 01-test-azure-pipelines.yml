trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    jobs:
      - job: FirstJob
        steps:
          - bash: echo "Build First Job"

  - stage: DevDeploy
    jobs:
      - job: DevDeployJob
        steps:
          - bash: echo "Dev Deploy"

  - stage: QADeploy
    jobs:
      - job: QADeployJob
        steps:
          - bash: echo "QA Deploy Job"

      - job: QA2
        steps:
          - bash: echo "QA2"
